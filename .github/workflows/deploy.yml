# Deploy Next.js static export to GitHub Pages
# Secrets are injected as NEXT_PUBLIC_* env vars during build — never in source code.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Verify env vars are set
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || vars.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:   ${{ secrets.OPENROUTER_MODEL   || vars.OPENROUTER_MODEL }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL || vars.OPENROUTER_BASE_URL }}
        run: |
          echo "OPENROUTER_API_KEY  : $( [ -n "$OPENROUTER_API_KEY"   ] && echo 'SET' || echo 'MISSING' )"
          echo "OPENROUTER_MODEL    : $( [ -n "$OPENROUTER_MODEL"     ] && echo 'SET' || echo 'MISSING' )"
          echo "OPENROUTER_BASE_URL : $( [ -n "$OPENROUTER_BASE_URL"  ] && echo 'SET' || echo 'MISSING' )"

      - name: Build static export
        working-directory: .
        env:
          # Each var falls back: Secrets → Variables (both stores are supported)
          NEXT_PUBLIC_OPENROUTER_API_KEY:       ${{ secrets.OPENROUTER_API_KEY       || vars.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_OPENROUTER_MODEL:         ${{ secrets.OPENROUTER_MODEL         || vars.OPENROUTER_MODEL }}
          NEXT_PUBLIC_OPENROUTER_BASE_URL:      ${{ secrets.OPENROUTER_BASE_URL      || vars.OPENROUTER_BASE_URL }}
          NEXT_PUBLIC_MONGODB_DATA_API_KEY:     ${{ secrets.MONGODB_DATA_API_KEY     || vars.MONGODB_DATA_API_KEY }}
          NEXT_PUBLIC_MONGODB_DATA_API_ENDPOINT: ${{ secrets.MONGODB_DATA_API_ENDPOINT || vars.MONGODB_DATA_API_ENDPOINT }}
          NEXT_PUBLIC_BASE_PATH:                ${{ secrets.BASE_PATH                || vars.BASE_PATH }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
